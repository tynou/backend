syntax = "proto3";
option csharp_namespace = "Common.Contracts.Grpc";

service UserVerificationGrpc {
  rpc GetUserVerification (UserVerificationRequest) returns (UserVerificationResponse);
}

message UserVerificationRequest {
  int32 user_id = 1;
}

message UserVerificationResponse {
  bool is_verified = 1;
  bool user_exists = 2;
}